services:
  markupp:
    build:
      context: ./markupp
      dockerfile: Dockerfile.dev
    ports:
      - "${MARKUPP_PORT:-8080}:8080"
    volumes:
      - ./markupp:/src
      - ${DATA_VOLUME:-markupp_data}:/data
      - ${GO_MOD_CACHE:-go_mod_cache}:/go/pkg/mod

volumes:
  markupp_data:
  go_mod_cache:
