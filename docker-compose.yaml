services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/src
      - ${DATA_VOLUME:-markupp_data}:/data
      - ${GO_MOD_CACHE:-go_mod_cache}:/go/pkg/mod

volumes:
  markupp_data:
  go_mod_cache:
